name: Alex Cooper Foreclosure Scraper

on:
  schedule:
    # Daily at 6am Eastern (10:00 UTC)
    - cron: '0 12-21 * * 1-5'  # Every hour Mon-Fri 8am-5pm Eastern (12:00-21:00 UTC, EDT)
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests playwright python-dotenv
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        env:
          AC_EMAIL: ${{ secrets.AC_EMAIL }}
          AC_PASSWORD: ${{ secrets.AC_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: schittigori-lab
          GITHUB_REPO: alexcooper-auction-data
        run: python alexcooper_scraper.py

      - name: Archive and commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p archive
          cp alexcooper_auctions.json archive/$(date +%Y-%m-%d).json
          find archive -name "*.json" -mtime +30 -delete
          git add alexcooper_auctions.json alexcooper_debug.html archive/$(date +%Y-%m-%d).json
          git diff --cached --quiet || git commit -m "Foreclosure update $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
